<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Heart Particle Animation</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0a0a0a; }
        canvas { display: block; }
    </style>
</head>
<body>

    <!-- Hidden SVG heart path -->
    <svg style="position:absolute;left:-9999px;top:-9999px;" viewBox="0 0 600 552">
        <path id="heartPath" d="M300,552 C300,552 0,400 0,200 C0,80 80,0 200,0 C260,0 280,40 300,80 C320,40 340,0 400,0 C520,0 600,80 600,200 C600,400 300,552 300,552Z" />
    </svg>

    <!-- Import Three.js and GSAP from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>

    <script>
        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 400);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Add some ambient light for better visibility ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff3366, 1, 500);
        pointLight.position.set(100, 100, 200);
        scene.add(pointLight);

        // --- Heart Particle System ---
        const path = document.querySelector("#heartPath");
        const length = path.getTotalLength();

        // We'll store all vertices and create a single BufferGeometry
        const positions = [];
        const colors = [];
        const sizes = [];

        // Color palette: reds, pinks, purples
        const colorPalette = [
            new THREE.Color(0xff0040),
            new THREE.Color(0xff3366),
            new THREE.Color(0xff6699),
            new THREE.Color(0xff0088),
            new THREE.Color(0xcc0066),
            new THREE.Color(0xff4488),
        ];

        // Sample points along the path
        for (let i = 0; i < length; i += 0.1) {
            const point = path.getPointAtLength(i);

            // Base position (flip Y to match SVG coordinate system)
            let x = point.x - 300; // center X
            let y = -(point.y - 276); // center Y and flip
            let z = 0;

            // Add random scatter (exactly as in your code)
            x += (Math.random() - 0.5) * 30;
            y += (Math.random() - 0.5) * 30;
            z += (Math.random() - 0.5) * 70;

            positions.push(x, y, z);

            // Random color from palette
            const col = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            colors.push(col.r, col.g, col.b);

            // Random size
            sizes.push(Math.random() * 4 + 1.5);

            // Skip some points to avoid overcrowding (adjust as needed)
            i += 0.002;
        }

        // --- Create Particle Geometry ---
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

        // --- Particle Texture (soft circle) ---
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);

        // --- Particle Material ---
        const material = new THREE.PointsMaterial({
            size: 4,
            map: texture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: true,
            opacity: 0.9,
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Animation: GSAP to move particles from center ---
        // Get all position attributes
        const posAttr = geometry.attributes.position;
        const originalPos = new Float32Array(posAttr.array);

        // Store target positions (center) for each particle
        const centerX = 0;
        const centerY = 0;
        const centerZ = 0;

        // Create a GSAP timeline
        const tl = gsap.timeline({
            paused: false,
            repeat: -1,
            yoyo: true,
            ease: "power2.inOut",
        });

        // Animate each particle from center to its final position
        // We'll use a custom object to tween progress
        const progress = { value: 0 };

        // Instead of tweening each particle individually (which would be slow),
        // we tween a single progress value and update all particles in an onUpdate callback
        tl.to(progress, {
            value: 1,
            duration: 3,
            ease: "power2.inOut",
            onUpdate: () => {
                const p = progress.value;
                const arr = posAttr.array;
                for (let i = 0; i < arr.length; i++) {
                    // Interpolate from center (0,0,0) to original position
                    arr[i] = originalPos[i] * p;
                }
                posAttr.needsUpdate = true;
            }
        });

        // Also tween the scale of the whole system for a "breathing" effect
        tl.to(particleSystem.scale, {
            x: 1.05,
            y: 1.05,
            z: 1.05,
            duration: 1.5,
            ease: "sine.inOut",
            yoyo: true,
            repeat: 1,
        }, 0);

        // Add a subtle rotation
        tl.to(particleSystem.rotation, {
            y: Math.PI * 2,
            duration: 20,
            ease: "none",
            repeat: -1,
        }, 0);

        // --- Window resize handler ---
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Small pause before starting the animation to let everything load
        setTimeout(() => {
            tl.play();
        }, 500);

        console.log('❤️ Heart particle animation running!');
    </script>
</body>
</html>
